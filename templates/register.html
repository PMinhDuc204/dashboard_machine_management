{% load static %}

<!doctype html>
<html class="no-js" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
      name="viewport"
    />
    <meta
      name="description"
      content="Responsive Bootstrap 4 and web Application ui kit."
    />

    <title>MECA-NSUTC2501:: Sign Up</title>
    <link rel="icon" href="{% static 'images/logo.svg' %}" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="{% static 'plugins/bootstrap/css/bootstrap.min.css' %}"
    />
    <link rel="stylesheet" href="{% static 'css/style.min.css' %}" />
  </head>

  <body class="theme-blush">
    <div class="authentication">
      <div class="container">
        <div class="row">
          <div class="col-lg-4 col-sm-12">
            <form class="card auth_form" action="" method="POST">
              {% csrf_token %}
              <div class="header">
                <img class="logo" src="{% static 'images/logo.svg' %}" alt="" />
                <h5>Sign Up</h5>
                <span>Register a new membership</span>
              </div>
              <div class="body">
                {% include 'partials/_messages.html' %}
                
                <div class="input-group mb-3">
                  <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Username"
                    value="{{fieldValues.username}}"
                  />
                  <div class="input-group-append">
                    <span class="input-group-text"
                      ><i class="zmdi zmdi-account-circle"></i
                    ></span>
                  </div>
                </div>

                <div class="input-group mb-3">
                  <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Email"
                    value="{{fieldValues.email}}"
                  />
                  <div class="input-group-append">
                    <span class="input-group-text"
                      ><i class="zmdi zmdi-email"></i
                    ></span>
                  </div>
                </div>

                <div class="input-group mb-3">
                  <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Password"
                    value="{{fieldValues.password}}"
                  />
                  <div class="input-group-append">
                    <span class="input-group-text"
                      ><i class="zmdi zmdi-lock"></i
                    ></span>
                  </div>
                </div>

                <div class="checkbox">
                  <input id="remember_me" type="checkbox" />
                  <label for="remember_me"
                    >I read and agree to the
                    <a href="javascript:void(0);">terms of usage</a></label
                  >
                </div>
                <button
                  type="submit"
                  class="btn btn-primary btn-block waves-effect waves-light"
                >
                  SIGN UP
                </button>
                <div class="signin_with mt-3">
                  <a class="link" href="{% url 'login' %}"
                    >Already have an account? Sign In</a
                  >
                </div>
              </div>
            </form>
            <div class="copyright text-center">
              &copy;
              <script>
                document.write(new Date().getFullYear());
              </script>
              ,
              <span><a href="templatespoint.net">Templates Point</a></span>
            </div>
          </div>
          <div class="col-lg-8 col-sm-12">
            <div class="card">
              <img src="{% static 'images/signup.svg' %}" alt="Sign Up" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Jquery Core Js -->
    <script src="{% static 'bundles/libscripts.bundle.js' %}"></script>
    <script src="{% static 'bundles/vendorscripts.bundle.js' %}"></script>
    <!-- Lib Scripts Plugin Js -->
  </body>
</html>
